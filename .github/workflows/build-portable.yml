name: Build portable Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Create build environment
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Build portable ZIP
        shell: pwsh
        run: .\build_portable.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkinWatcher-portable
          path: dist/SkinWatcher-portable.zip
          if-no-files-found: error

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "dist/SkinWatcher-portable.zip" --title "SkinWatcher ${{ github.ref_name }}" --generate-notes
